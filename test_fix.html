<!DOCTYPE html>
<html>
<head>
    <title>Test Unknown Phenomena Fix</title>
    <script>
        const translations = {
            'Unknown Phenomena': '未解之谜',
            '未解之谜': 'Unknown Phenomena'
        };
        
        let currentLang = 'en';
        
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            
            document.querySelectorAll('[data-translate]').forEach(function(el) {
                const key = el.getAttribute('data-translate');
                if (translations[key]) {
                    if (!el.getAttribute('data-original')) {
                        el.setAttribute('data-original', el.textContent.trim());
                    }
                    el.textContent = translations[key];
                }
            });
            
            document.getElementById('status').textContent = 
                'Current language: ' + currentLang + ' | Text: ' + document.getElementById('testText').textContent;
        }
    </script>
</head>
<body>
    <h2>Test 1: English element with data-translate="Unknown Phenomena"</h2>
    <div id="testText" data-translate="Unknown Phenomena">Unknown Phenomena</div>
    
    <h2>Test 2: Chinese element with data-translate="未解之谜"</h2>
    <div data-translate="未解之谜">未解之谜</div>
    
    <button onclick="toggleLanguage()">Toggle Language</button>
    <div id="status">Current language: en | Text: Unknown Phenomena</div>
    
    <script>
        // Initialize
        document.getElementById('status').textContent = 
            'Current language: ' + currentLang + ' | Text: ' + document.getElementById('testText').textContent;
    </script>
</body>
</html>
