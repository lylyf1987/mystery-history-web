<!DOCTYPE html>
<html>
<head>
    <title>Translation Test</title>
    <style>
        .language-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 data-translate="Mystery History">Mystery History</h1>
    <p data-translate="Explore Stories">Explore Stories</p>
    <button class="language-toggle" id="langToggle" onclick="toggleLanguage()" title="Switch Language">EN</button>
    
    <script src="src/static/js/translate.js"></script>
    
    <script>
        // Test function to see if toggleLanguage is accessible
        console.log('Translation test page loaded');
        console.log('toggleLanguage function exists:', typeof toggleLanguage === 'function');
        
        // Try to trigger translation after 2 seconds
        setTimeout(() => {
            console.log('Testing toggleLanguage function...');
            if (typeof toggleLanguage === 'function') {
                console.log('Calling toggleLanguage()');
                toggleLanguage();
            } else {
                console.error('toggleLanguage is not a function');
            }
        }, 2000);
    </script>
</body>
</html>
